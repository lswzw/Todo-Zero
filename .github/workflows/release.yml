name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          BINARY="todo-zero-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="${BINARY}.exe"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -tags netgo,osusergo \
            -o "../${BINARY}" .

      - name: Install UPX
        if: matrix.goos != 'darwin'
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Compress binary (UPX)
        if: matrix.goos != 'darwin'
        run: |
          BINARY="todo-zero-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="${BINARY}.exe"
          upx --best --lzma "${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-zero-${{ matrix.goos }}-${{ matrix.goarch }}
          path: todo-zero-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename and collect release files
        run: |
          mkdir -p release
          for dir in artifacts/todo-zero-*/; do
            for f in "${dir}"*; do
              [ -f "$f" ] || continue
              filename=$(basename "$f")
              # Add tag version: todo-zero-linux-amd64 → todo-zero-v1.2.0-linux-amd64
              newname=$(echo "$filename" | sed 's/^todo-zero/todo-zero-${{ github.ref_name }}/')
              cp "$f" "release/${newname}"
            done
          done
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
