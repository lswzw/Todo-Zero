<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <!-- 预加载关键字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- 内联关键 CSS：首屏渲染必需的样式 -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color:#303133;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh}
      #app{min-height:100vh}
      /* 骨架屏 */
      .app-skeleton{min-height:100vh;display:flex;align-items:center;justify-content:center}
      .skeleton-spinner{width:40px;height:40px;border:3px solid rgba(102,126,234,0.15);border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 骨架屏：JS 加载前显示 -->
      <div class="app-skeleton">
        <div class="skeleton-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
