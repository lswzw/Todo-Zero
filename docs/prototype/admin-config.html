<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - 系统设置</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f2f5;
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .logo {
      font-size: 20px;
      font-weight: 600;
      color: #303133;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    .sidebar {
      width: 200px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,0.04);
      padding: 16px 0;
    }
    .sidebar .menu-item {
      display: block;
      padding: 12px 24px;
      color: #606266;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    .sidebar .menu-item:hover { background: #f5f7fa; color: #409eff; }
    .sidebar .menu-item.active { background: #ecf5ff; color: #409eff; font-weight: 500; }
    .content {
      flex: 1;
      padding: 24px;
    }
    .page-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h2 { font-size: 18px; color: #303133; }
    .config-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .config-item:last-child { border-bottom: none; }
    .config-item .info h3 { font-size: 15px; color: #303133; margin-bottom: 4px; }
    .config-item .info p { font-size: 13px; color: #909399; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">📝 Todo App 管理后台</div>
      <div class="right">
        <span style="color:#606266;font-size:14px">管理员：admin</span>
        <el-button text @click="window.location.href='index.html'">前台首页</el-button>
        <el-button type="danger" text>退出登录</el-button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <a class="menu-item" href="admin-user.html">👤 用户管理</a>
        <a class="menu-item active" href="admin-config.html">⚙️ 系统设置</a>
        <a class="menu-item" href="admin-log.html">📋 操作日志</a>
        <a class="menu-item" href="admin-login-log.html">🔑 登录日志</a>
      </div>

      <div class="content">
        <div class="page-card">
          <div class="page-header">
            <h2>系统设置</h2>
          </div>

          <div class="config-item">
            <div class="info">
              <h3>开放注册</h3>
              <p>开启后允许新用户自行注册账号，关闭后仅管理员可创建账号</p>
            </div>
            <el-switch
              v-model="config.allowRegister"
              active-text="开启"
              inactive-text="关闭"
              @change="saveConfig('allowRegister')"
            />
          </div>

          <div class="config-item">
            <div class="info">
              <h3>站点名称</h3>
              <p>显示在浏览器标题栏和登录页面</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <el-input v-model="config.siteName" style="width:200px" />
              <el-button type="primary" @click="saveConfig('siteName')">保存</el-button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script>
    const { createApp, reactive } = Vue
    const app = createApp({
      setup() {
        const config = reactive({
          allowRegister: true,
          siteName: 'Todo App'
        })

        const saveConfig = (key) => {
          ElementPlus.ElMessage.success(`配置已保存：${key}`)
        }

        return { config, saveConfig }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
