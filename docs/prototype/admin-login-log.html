<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - 登录日志</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f2f5;
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .logo {
      font-size: 20px;
      font-weight: 600;
      color: #303133;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    .sidebar {
      width: 200px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,0.04);
      padding: 16px 0;
    }
    .sidebar .menu-item {
      display: block;
      padding: 12px 24px;
      color: #606266;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    .sidebar .menu-item:hover { background: #f5f7fa; color: #409eff; }
    .sidebar .menu-item.active { background: #ecf5ff; color: #409eff; font-weight: 500; }
    .content {
      flex: 1;
      padding: 24px;
    }
    .page-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .page-header h2 { font-size: 18px; color: #303133; }
    .status-tag {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status-success { background: #f0f9eb; color: #67c23a; }
    .status-fail { background: #fef0f0; color: #f56c6c; }
    .pagination-wrap { display: flex; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">📝 Todo App 管理后台</div>
      <div class="right">
        <span style="color:#606266;font-size:14px">管理员：admin</span>
        <el-button text @click="window.location.href='index.html'">前台首页</el-button>
        <el-button type="danger" text>退出登录</el-button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <a class="menu-item" href="admin-user.html">👤 用户管理</a>
        <a class="menu-item" href="admin-config.html">⚙️ 系统设置</a>
        <a class="menu-item" href="admin-log.html">📋 操作日志</a>
        <a class="menu-item active" href="admin-login-log.html">🔑 登录日志</a>
      </div>

      <div class="content">
        <div class="page-card">
          <div class="page-header">
            <h2>登录日志</h2>
            <el-input v-model="keyword" placeholder="搜索用户名..." clearable style="width:240px" prefix-icon="Search" />
          </div>

          <el-table :data="pagedLogs" stripe>
            <el-table-column prop="id" label="ID" width="70" />
            <el-table-column prop="username" label="用户名" width="130" />
            <el-table-column label="状态" width="90">
              <template #default="{ row }">
                <span :class="['status-tag', row.status === 1 ? 'status-success' : 'status-fail']">
                  {{ row.status === 1 ? '成功' : '失败' }}
                </span>
              </template>
            </el-table-column>
            <el-table-column prop="ip" label="IP地址" width="150" />
            <el-table-column prop="userAgent" label="浏览器" show-overflow-tooltip />
            <el-table-column prop="remark" label="备注" width="150" show-overflow-tooltip />
            <el-table-column prop="createTime" label="登录时间" width="180" />
          </el-table>

          <div class="pagination-wrap">
            <el-pagination
              v-model:current-page="currentPage"
              :page-size="pageSize"
              :total="filteredLogs.length"
              layout="total, prev, pager, next"
            />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script>
    const { createApp, reactive, ref, computed } = Vue
    const app = createApp({
      setup() {
        const keyword = ref('')
        const currentPage = ref(1)
        const pageSize = ref(10)

        const logs = reactive([
          { id: 1, username: 'admin', status: 1, ip: '192.168.1.100', userAgent: 'Chrome 120 / Windows 10', remark: '', createTime: '2024-01-20 15:30:00' },
          { id: 2, username: 'zhangsan', status: 1, ip: '192.168.1.101', userAgent: 'Chrome 120 / macOS', remark: '', createTime: '2024-01-20 14:00:00' },
          { id: 3, username: 'lisi', status: 0, ip: '10.0.0.55', userAgent: 'Firefox 121 / Windows 11', remark: '密码错误', createTime: '2024-01-20 11:30:00' },
          { id: 4, username: 'lisi', status: 1, ip: '10.0.0.55', userAgent: 'Firefox 121 / Windows 11', remark: '', createTime: '2024-01-20 11:32:00' },
          { id: 5, username: 'admin', status: 1, ip: '192.168.1.100', userAgent: 'Chrome 120 / Windows 10', remark: '', createTime: '2024-01-19 09:00:00' },
          { id: 6, username: 'wangwu', status: 0, ip: '172.16.0.10', userAgent: 'Safari 17 / macOS', remark: '账号已禁用', createTime: '2024-01-18 20:15:00' },
          { id: 7, username: 'zhaoliu', status: 1, ip: '192.168.1.105', userAgent: 'Chrome 120 / Windows 10', remark: '', createTime: '2024-01-18 16:45:00' },
          { id: 8, username: 'admin', status: 1, ip: '192.168.1.100', userAgent: 'Chrome 120 / Windows 10', remark: '', createTime: '2024-01-17 09:00:00' },
        ])

        const filteredLogs = computed(() => {
          if (!keyword.value) return logs
          return logs.filter(l => l.username.includes(keyword.value))
        })

        const pagedLogs = computed(() => {
          const start = (currentPage.value - 1) * pageSize.value
          return filteredLogs.value.slice(start, start + pageSize.value)
        })

        return { keyword, currentPage, pageSize, logs, filteredLogs, pagedLogs }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
